document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nge: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"bedd551c-85b0-44d2-818f-0085012e7ea5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"4e63a22c-c8c7-4560-9db5-69e0d8c4b576\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"c13d0d0b-2067-4360-9a81-668b5aedbe19\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bedd551c-85b0-44d2-818f-0085012e7ea5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n  <style>/* ========================================================\n   Alexis Martinho — Portfolio\n   Design tokens\n   ======================================================== */\n\n:root {\n  /* Surfaces (layered dark) */\n  --bg-0: #09090B;\n  --bg-1: #0E0E11;\n  --bg-2: #141418;\n  --bg-3: #1B1B21;\n  --bg-4: #24242C;\n\n  /* Lines */\n  --line: #26262E;\n  --line-strong: #33333D;\n\n  /* Text */\n  --text-hi: #F2F2F5;\n  --text: #C8C8CE;\n  --text-dim: #86868F;\n  --text-faint: #55555D;\n\n  /* Accent (cool blue) — settable via Tweaks */\n  --accent: oklch(0.72 0.15 258);\n  --accent-2: oklch(0.58 0.15 258);\n  --accent-soft: oklch(0.72 0.15 258 / 0.12);\n  --accent-line: oklch(0.72 0.15 258 / 0.35);\n\n  /* Semantic */\n  --warn: #D4A24C;\n  --warn-soft: rgba(212, 162, 76, 0.12);\n\n  /* Fonts — settable via Tweaks */\n  --font-display: 'JetBrains Mono', ui-monospace, Menlo, monospace;\n  --font-body: 'IBM Plex Sans', system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;\n\n  /* Rhythm */\n  --r-1: 4px;\n  --r-2: 8px;\n  --r-3: 16px;\n  --r-4: 24px;\n  --r-5: 40px;\n  --r-6: 64px;\n  --r-7: 96px;\n\n  --radius-xs: 2px;\n  --radius-sm: 4px;\n  --radius-md: 8px;\n\n  --shell-max: 1280px;\n  --gutter: 32px;\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; background: var(--bg-0); }\n\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: var(--font-body);\n  color: var(--text);\n  font-size: 15px;\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  min-height: 100vh;\n  background:\n    radial-gradient(1200px 600px at 85% -10%, rgba(107, 138, 255, 0.04), transparent 60%),\n    radial-gradient(900px 500px at -10% 30%, rgba(107, 138, 255, 0.03), transparent 60%),\n    var(--bg-0);\n}\n\na { color: inherit; text-decoration: none; }\n\nimg { max-width: 100%; display: block; }\n\n::selection { background: var(--accent-soft); color: var(--text-hi); }\n\n/* ==========================\n   Typography\n   ========================== */\n\n.display {\n  font-family: var(--font-display);\n  font-weight: 500;\n  color: var(--text-hi);\n  letter-spacing: -0.02em;\n}\n\n.mono {\n  font-family: var(--font-mono);\n  font-feature-settings: \"calt\" 0;\n}\n\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-dim);\n}\n\n.eyebrow .idx { color: var(--accent); }\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-hi);\n  margin: 0;\n  letter-spacing: -0.02em;\n  font-weight: 500;\n}\n\nh1 { font-size: clamp(40px, 6vw, 76px); line-height: 1.02; }\nh2 { font-size: clamp(28px, 3.4vw, 42px); line-height: 1.1; }\nh3 { font-size: clamp(20px, 1.6vw, 24px); line-height: 1.2; }\n\np { margin: 0 0 1em; text-wrap: pretty; max-width: 64ch; }\n\n/* ==========================\n   Shell / layout\n   ========================== */\n\n.shell {\n  max-width: var(--shell-max);\n  margin: 0 auto;\n  padding: 0 var(--gutter);\n}\n\n.section { padding: var(--r-7) 0; }\n.section-sm { padding: var(--r-6) 0; }\n\n.divider {\n  height: 1px;\n  background: var(--line);\n  border: 0;\n  margin: 0;\n}\n\n/* Section headers with numbered index */\n.section-head {\n  display: flex;\n  align-items: baseline;\n  gap: 20px;\n  margin-bottom: var(--r-5);\n  padding-bottom: var(--r-3);\n  border-bottom: 1px solid var(--line);\n}\n.section-head .num {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  color: var(--accent);\n}\n.section-head h2 { flex: 1; }\n.section-head .meta {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-dim);\n}\n\n/* ==========================\n   Top nav\n   ========================== */\n\n.topbar {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  background: rgba(9, 9, 11, 0.72);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid var(--line);\n}\n.topbar-inner {\n  max-width: var(--shell-max);\n  margin: 0 auto;\n  padding: 18px var(--gutter);\n  display: flex;\n  align-items: center;\n  gap: 24px;\n}\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-mono);\n  font-size: 13px;\n  color: var(--text-hi);\n  letter-spacing: -0.01em;\n}\n.brand .dot {\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  background: var(--accent);\n  box-shadow: 0 0 0 4px var(--accent-soft);\n}\n.brand .tag { color: var(--text-dim); font-weight: 400; }\n.nav {\n  margin-left: auto;\n  display: flex;\n  gap: 4px;\n  font-family: var(--font-mono);\n  font-size: 12.5px;\n  letter-spacing: 0.02em;\n}\n.nav a {\n  padding: 8px 14px;\n  color: var(--text-dim);\n  border-radius: var(--radius-sm);\n  transition: color 160ms ease, background 160ms ease;\n}\n.nav a:hover { color: var(--text-hi); background: var(--bg-2); }\n.nav a.active {\n  color: var(--text-hi);\n  background: var(--bg-2);\n  box-shadow: inset 0 0 0 1px var(--line);\n}\n\n/* ==========================\n   Buttons\n   ========================== */\n\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 18px;\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: 0.02em;\n  color: var(--text-hi);\n  background: var(--bg-2);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-sm);\n  cursor: pointer;\n  transition: all 180ms ease;\n}\n.btn:hover {\n  border-color: var(--accent-line);\n  background: var(--bg-3);\n  transform: translateY(-1px);\n}\n.btn .arrow { transition: transform 180ms ease; }\n.btn:hover .arrow { transform: translateX(3px); }\n\n.btn-primary {\n  background: var(--accent-soft);\n  border-color: var(--accent-line);\n  color: var(--text-hi);\n}\n.btn-primary:hover { background: color-mix(in oklch, var(--accent) 22%, transparent); }\n\n.btn-ghost { background: transparent; }\n.btn-ghost:hover { background: var(--bg-2); }\n\n.btn[aria-disabled=\"true\"] {\n  opacity: 0.5;\n  cursor: not-allowed;\n  pointer-events: none;\n}\n\n/* ==========================\n   Badges / tags\n   ========================== */\n\n.badges { display: flex; flex-wrap: wrap; gap: 6px; }\n\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--font-mono);\n  font-size: 11.5px;\n  padding: 5px 10px;\n  color: var(--text);\n  background: var(--bg-2);\n  border: 1px solid var(--line);\n  border-radius: 100px;\n  letter-spacing: 0.01em;\n}\n.badge .k { color: var(--text-faint); }\n.badge.accent { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }\n.badge.warn { color: var(--warn); border-color: rgba(212, 162, 76, 0.35); background: var(--warn-soft); }\n\n/* Status pill */\n.status {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--font-mono);\n  font-size: 11.5px;\n  padding: 4px 10px;\n  border: 1px solid var(--line);\n  border-radius: 100px;\n  color: var(--text-dim);\n}\n.status .pulse {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: #4ADE80;\n  box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6);\n  animation: pulse 2s infinite;\n}\n.status.warn .pulse { background: var(--warn); box-shadow: 0 0 0 0 rgba(212, 162, 76, 0.6); }\n@keyframes pulse {\n  0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }\n  70% { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }\n  100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }\n}\n\n/* ==========================\n   Cards\n   ========================== */\n\n.card {\n  position: relative;\n  background: var(--bg-1);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-md);\n  overflow: hidden;\n  transition: border-color 220ms ease, transform 220ms ease, background 220ms ease;\n}\n.card:hover {\n  border-color: var(--accent-line);\n  background: var(--bg-2);\n}\n.card .card-body { padding: 22px; }\n.card .card-head {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  gap: 16px;\n  margin-bottom: 14px;\n}\n.card .card-title {\n  font-family: var(--font-display);\n  font-size: 20px;\n  color: var(--text-hi);\n  letter-spacing: -0.01em;\n}\n.card .card-sub {\n  font-family: var(--font-mono);\n  font-size: 11.5px;\n  color: var(--text-dim);\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n  margin-top: 4px;\n}\n.card .card-desc {\n  font-size: 14px;\n  color: var(--text);\n  line-height: 1.55;\n}\n\n/* Project card with visual header */\n.project-card { display: flex; flex-direction: column; min-height: 380px; }\n.project-card .thumb {\n  height: 180px;\n  position: relative;\n  overflow: hidden;\n  border-bottom: 1px solid var(--line);\n  background: var(--bg-2);\n}\n.project-card .card-body { flex: 1; display: flex; flex-direction: column; gap: 14px; }\n.project-card .card-body .desc { flex: 1; }\n\n/* Grid helpers */\n.grid { display: grid; gap: 20px; }\n.grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }\n.grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }\n.grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }\n@media (max-width: 900px) {\n  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }\n}\n\n/* ==========================\n   Placeholder visuals\n   ========================== */\n\n/* Striped \"asset goes here\" placeholder */\n.ph {\n  position: relative;\n  background:\n    repeating-linear-gradient(\n      135deg,\n      rgba(255,255,255,0.018) 0 8px,\n      transparent 8px 16px\n    ),\n    var(--bg-2);\n  border: 1px dashed var(--line-strong);\n  border-radius: var(--radius-sm);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--text-faint);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  min-height: 160px;\n  padding: 16px;\n  text-align: center;\n}\n\n.ph::after {\n  content: '';\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.35));\n}\n\n.ph-caption {\n  position: relative;\n  z-index: 1;\n  max-width: 240px;\n}\n\n/* ==========================\n   Footer\n   ========================== */\n\nfooter.foot {\n  border-top: 1px solid var(--line);\n  padding: var(--r-6) 0 var(--r-4);\n  margin-top: var(--r-6);\n}\nfooter.foot .row {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 24px;\n  justify-content: space-between;\n  align-items: flex-end;\n}\nfooter.foot .sign {\n  font-family: var(--font-display);\n  font-size: clamp(36px, 6vw, 64px);\n  color: var(--text-hi);\n  letter-spacing: -0.02em;\n  line-height: 1;\n}\nfooter.foot .links {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  font-family: var(--font-mono);\n  font-size: 13px;\n}\nfooter.foot .links a { color: var(--text-dim); transition: color 160ms ease; }\nfooter.foot .links a:hover { color: var(--accent); }\nfooter.foot .legal {\n  margin-top: 32px;\n  padding-top: 16px;\n  border-top: 1px solid var(--line);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-faint);\n  display: flex;\n  justify-content: space-between;\n  flex-wrap: wrap;\n  gap: 8px;\n}\n\n/* ==========================\n   Utilities\n   ========================== */\n\n.bracket { color: var(--text-faint); font-family: var(--font-mono); }\n.accent-text { color: var(--accent); }\n.dim { color: var(--text-dim); }\n.faint { color: var(--text-faint); }\n.hi { color: var(--text-hi); }\n\n.row-flex { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }\n\n.kv {\n  display: grid;\n  grid-template-columns: 140px 1fr;\n  gap: 8px 16px;\n  font-family: var(--font-mono);\n  font-size: 13px;\n}\n.kv dt { color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; align-self: center; }\n.kv dd { margin: 0; color: var(--text-hi); }\n\n/* Reveal on scroll */\n.reveal {\n  opacity: 0;\n  transform: translateY(18px);\n  transition: opacity 700ms cubic-bezier(.2,.6,.2,1), transform 700ms cubic-bezier(.2,.6,.2,1);\n}\n.reveal.in { opacity: 1; transform: none; }\n\n/* Blinking cursor */\n.cursor {\n  display: inline-block;\n  width: 0.5ch;\n  height: 0.85em;\n  vertical-align: text-bottom;\n  background: var(--accent);\n  margin-left: 4px;\n  animation: blink 1.1s steps(2) infinite;\n}\n@keyframes blink { 50% { opacity: 0; } }\n\n/* Noise overlay (subtle grain) — CSS-only radial dot pattern */\n.noise::before {\n  content: '';\n  position: fixed;\n  inset: 0;\n  pointer-events: none;\n  opacity: 0.025;\n  background-image:\n    radial-gradient(rgba(255,255,255,0.8) 0.5px, transparent 1px),\n    radial-gradient(rgba(255,255,255,0.6) 0.5px, transparent 1px);\n  background-size: 3px 3px, 5px 5px;\n  background-position: 0 0, 1px 2px;\n  z-index: 1;\n}\n\n/* Cursor trail dot */\n.cursor-trail {\n  position: fixed;\n  width: 16px;\n  height: 16px;\n  border-radius: 50%;\n  pointer-events: none;\n  border: 1px solid var(--accent-line);\n  transform: translate(-50%, -50%);\n  transition: transform 180ms cubic-bezier(.2,.6,.2,1), width 180ms ease, height 180ms ease, border-color 180ms ease;\n  z-index: 99;\n  mix-blend-mode: screen;\n}\n.cursor-trail.hover {\n  width: 36px;\n  height: 36px;\n  border-color: var(--accent);\n  background: var(--accent-soft);\n}\n@media (hover: none) { .cursor-trail { display: none; } }\n\n/* ==========================\n   Hero (generic for inner pages)\n   ========================== */\n\n.page-hero { padding: var(--r-6) 0 var(--r-5); border-bottom: 1px solid var(--line); }\n.page-hero .eyebrow { margin-bottom: 16px; }\n.page-hero h1 { font-size: clamp(44px, 7vw, 88px); }\n.page-hero .lede {\n  margin-top: 20px;\n  max-width: 64ch;\n  font-size: 17px;\n  color: var(--text);\n}\n\n/* ==========================\n   Tweaks panel\n   ========================== */\n\n#tweaks {\n  position: fixed;\n  right: 20px;\n  bottom: 20px;\n  z-index: 100;\n  width: 280px;\n  background: var(--bg-1);\n  border: 1px solid var(--line-strong);\n  border-radius: 8px;\n  padding: 16px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  display: none;\n  box-shadow: 0 30px 60px rgba(0,0,0,0.5);\n}\n#tweaks.open { display: block; }\n#tweaks h4 {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--text-dim);\n  margin: 0 0 14px;\n  display: flex;\n  justify-content: space-between;\n}\n#tweaks h4 .close { color: var(--text-faint); cursor: pointer; }\n#tweaks label { display: block; color: var(--text-dim); margin: 10px 0 6px; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10.5px; }\n#tweaks .swatches { display: flex; gap: 6px; flex-wrap: wrap; }\n#tweaks .sw {\n  width: 28px; height: 28px; border-radius: 4px; cursor: pointer;\n  border: 1px solid var(--line); transition: transform 140ms ease, border-color 140ms ease;\n}\n#tweaks .sw:hover { transform: scale(1.05); }\n#tweaks .sw.active { border-color: var(--text-hi); transform: scale(1.08); }\n#tweaks .opts { display: flex; flex-direction: column; gap: 4px; }\n#tweaks .opt {\n  padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px;\n  color: var(--text); cursor: pointer; background: var(--bg-2); text-align: left;\n  font-family: inherit; font-size: 11.5px;\n}\n#tweaks .opt:hover { border-color: var(--accent-line); }\n#tweaks .opt.active { border-color: var(--accent); color: var(--text-hi); background: var(--accent-soft); }\n<\u002Fstyle>\n  \n  <style>\n    /* ============================\n       Home-only styles\n       ============================ */\n\n    .home-hero {\n      position: relative;\n      padding: 72px 0 40px;\n      min-height: 78vh;\n      display: flex;\n      align-items: center;\n      overflow: hidden;\n    }\n\n    .home-hero::before {\n      content: '';\n      position: absolute;\n      inset: 0;\n      pointer-events: none;\n      background:\n        radial-gradient(600px 400px at 78% 42%, var(--accent-soft), transparent 60%),\n        linear-gradient(180deg, transparent 70%, rgba(0,0,0,0.6));\n    }\n\n    .hero-grid {\n      position: relative;\n      display: grid;\n      grid-template-columns: 1.4fr 1fr;\n      gap: 64px;\n      width: 100%;\n      align-items: center;\n    }\n    @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; } }\n\n    .hero-meta {\n      display: flex;\n      gap: 14px;\n      margin-bottom: 28px;\n      flex-wrap: wrap;\n      align-items: center;\n    }\n\n    .home-hero h1 {\n      font-size: clamp(48px, 8.5vw, 116px);\n      font-weight: 500;\n      letter-spacing: -0.035em;\n      line-height: 0.92;\n    }\n    .home-hero h1 .line { display: block; }\n    .home-hero h1 .line.dim { color: var(--text-dim); }\n    .home-hero h1 .line.accent { color: var(--accent); }\n\n    .tagline {\n      margin-top: 28px;\n      max-width: 52ch;\n      font-size: 17px;\n      color: var(--text);\n      font-family: var(--font-body);\n      line-height: 1.55;\n    }\n\n    .hero-cta {\n      display: flex;\n      gap: 12px;\n      margin-top: 36px;\n      flex-wrap: wrap;\n    }\n\n    /* Identity panel on right */\n    .id-panel {\n      border: 1px solid var(--line);\n      background: var(--bg-1);\n      border-radius: 8px;\n      padding: 22px;\n      font-family: var(--font-mono);\n      font-size: 13px;\n      position: relative;\n    }\n    .id-panel::before {\n      content: '';\n      position: absolute;\n      top: -1px; left: 16px; right: 16px;\n      height: 1px;\n      background: linear-gradient(90deg, transparent, var(--accent), transparent);\n    }\n    .id-panel .head {\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      padding-bottom: 14px;\n      border-bottom: 1px solid var(--line);\n      margin-bottom: 16px;\n    }\n    .id-panel .head .label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; font-size: 10.5px; }\n    .id-panel .head .dots { display: flex; gap: 5px; }\n    .id-panel .head .dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); }\n    .id-panel .head .dots span:first-child { background: var(--accent); }\n    .id-panel dl { display: grid; grid-template-columns: 90px 1fr; gap: 10px 16px; margin: 0; }\n    .id-panel dt { color: var(--text-faint); }\n    .id-panel dd { margin: 0; color: var(--text-hi); }\n    .id-panel .stack {\n      margin-top: 18px; padding-top: 18px; border-top: 1px dashed var(--line);\n      display: flex; flex-wrap: wrap; gap: 5px;\n    }\n\n    /* Terminal hero variant */\n    :root[data-hero=\"terminal\"] .home-hero .terminal { display: block; }\n    :root[data-hero=\"terminal\"] .home-hero .identity,\n    :root[data-hero=\"terminal\"] .home-hero .editorial { display: none; }\n\n    :root[data-hero=\"editorial\"] .home-hero .editorial { display: block; }\n    :root[data-hero=\"editorial\"] .home-hero .identity,\n    :root[data-hero=\"editorial\"] .home-hero .terminal { display: none; }\n\n    :root[data-hero=\"identity\"] .home-hero .terminal,\n    :root[data-hero=\"identity\"] .home-hero .editorial { display: none; }\n\n    /* Terminal variant */\n    .terminal { display: none; width: 100%; }\n    .terminal-window {\n      border: 1px solid var(--line);\n      background: var(--bg-1);\n      border-radius: 8px;\n      font-family: var(--font-mono);\n      font-size: 14px;\n      line-height: 1.75;\n      overflow: hidden;\n      max-width: 820px;\n    }\n    .terminal-window .bar {\n      display: flex; align-items: center; gap: 6px;\n      padding: 10px 14px;\n      border-bottom: 1px solid var(--line);\n      background: var(--bg-2);\n    }\n    .terminal-window .bar .d { width: 10px; height: 10px; border-radius: 50%; background: var(--line-strong); }\n    .terminal-window .bar .d:nth-child(1) { background: #E55757; }\n    .terminal-window .bar .d:nth-child(2) { background: #E5B557; }\n    .terminal-window .bar .d:nth-child(3) { background: #8FD070; }\n    .terminal-window .bar .path { margin-left: 12px; color: var(--text-faint); font-size: 12px; }\n    .terminal-window .body { padding: 22px 26px; }\n    .terminal-window .prompt { color: var(--accent); }\n    .terminal-window .out { color: var(--text); }\n    .terminal-window .cmt { color: var(--text-faint); }\n\n    /* Editorial variant */\n    .editorial { display: none; }\n    .editorial h1 {\n      font-family: var(--font-display);\n      font-size: clamp(80px, 16vw, 240px);\n      line-height: 0.82;\n      letter-spacing: -0.05em;\n      font-weight: 500;\n    }\n    .editorial .col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; align-items: end; }\n    @media (max-width: 900px) { .editorial .col { grid-template-columns: 1fr; } }\n\n    /* Background ASCII-ish pattern */\n    .hero-bg-pattern {\n      position: absolute;\n      inset: 0;\n      pointer-events: none;\n      opacity: 0.18;\n      font-family: var(--font-mono);\n      font-size: 12px;\n      line-height: 1.4;\n      color: var(--text-faint);\n      overflow: hidden;\n      white-space: pre;\n      padding: 40px;\n      mask-image: radial-gradient(circle at 70% 50%, black, transparent 70%);\n      -webkit-mask-image: radial-gradient(circle at 70% 50%, black, transparent 70%);\n    }\n\n    /* Featured grid */\n    .featured { padding-top: var(--r-6); }\n    .featured-row {\n      display: grid;\n      grid-template-columns: repeat(6, 1fr);\n      gap: 24px;\n    }\n    @media (max-width: 1100px) { .featured-row { grid-template-columns: repeat(2, 1fr); } }\n    @media (max-width: 640px) { .featured-row { grid-template-columns: 1fr; } }\n\n    .feat-card { grid-column: span 2; }\n    .feat-card.wide { grid-column: span 3; }\n    .feat-card.full { grid-column: span 6; }\n    @media (max-width: 1100px) { .feat-card, .feat-card.wide, .feat-card.full { grid-column: span 1; } }\n\n    /* About preview */\n    .about-preview {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 48px;\n      align-items: start;\n    }\n    @media (max-width: 900px) { .about-preview { grid-template-columns: 1fr; } }\n    .about-preview .big {\n      font-family: var(--font-display);\n      font-size: clamp(24px, 2.6vw, 34px);\n      line-height: 1.3;\n      color: var(--text-hi);\n      letter-spacing: -0.015em;\n      text-wrap: balance;\n    }\n    .about-preview .big em {\n      color: var(--accent);\n      font-style: normal;\n    }\n    .about-preview .side dl { display: grid; grid-template-columns: auto 1fr; gap: 10px 18px; font-family: var(--font-mono); font-size: 13px; margin: 0; }\n    .about-preview .side dt { color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; align-self: center; }\n    .about-preview .side dd { margin: 0; color: var(--text-hi); }\n\n    /* Thumb motifs (per game) */\n    .thumb-motif {\n      position: absolute; inset: 0;\n      display: flex; align-items: center; justify-content: center;\n      overflow: hidden;\n    }\n    .thumb-motif .glyph {\n      font-family: var(--font-mono);\n      font-size: 10px;\n      color: var(--text-faint);\n      letter-spacing: 0.1em;\n      text-transform: uppercase;\n      position: absolute;\n      top: 12px; left: 16px;\n    }\n    .thumb-motif .tag-pos {\n      position: absolute;\n      top: 12px; right: 16px;\n      font-family: var(--font-mono);\n      font-size: 10px;\n      color: var(--text-faint);\n      letter-spacing: 0.1em;\n    }\n\n    /* GollumGO motif: glowing ring on swamp fog */\n    .motif-gollum {\n      background:\n        radial-gradient(600px 300px at 50% 100%, rgba(66, 84, 62, 0.25), transparent 60%),\n        radial-gradient(260px 160px at 50% 50%, rgba(190, 170, 120, 0.22), transparent 70%),\n        linear-gradient(180deg, #0A0D0A, #0C100D 60%, #0A0B09);\n    }\n    .motif-gollum .ring {\n      width: 120px; height: 120px;\n      border: 2px solid rgba(224, 196, 140, 0.85);\n      border-radius: 50%;\n      box-shadow:\n        0 0 40px rgba(224, 196, 140, 0.35),\n        0 0 80px rgba(224, 196, 140, 0.15),\n        inset 0 0 20px rgba(224, 196, 140, 0.25);\n    }\n\n    /* Onryō motif: red slash, ink */\n    .motif-onryo {\n      background:\n        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 40px),\n        radial-gradient(600px 400px at 20% 50%, rgba(180, 20, 20, 0.14), transparent 60%),\n        #080608;\n    }\n    .motif-onryo .slash {\n      position: absolute;\n      top: 20%; left: 20%;\n      width: 60%; height: 6px;\n      background: linear-gradient(90deg, transparent, #C8302A 30%, #E45A52, #C8302A 70%, transparent);\n      transform: rotate(-12deg);\n      box-shadow: 0 0 40px rgba(200, 48, 42, 0.6);\n    }\n    .motif-onryo .kanji {\n      position: absolute;\n      right: 18px; bottom: 14px;\n      font-family: var(--font-display);\n      font-size: 72px;\n      color: rgba(200, 48, 42, 0.35);\n      letter-spacing: -0.05em;\n      line-height: 1;\n    }\n\n    /* Wendogo motif: day/night cards */\n    .motif-wendogo {\n      background: #0A0B10;\n      display: flex; align-items: center; justify-content: center;\n    }\n    .motif-wendogo .cards { display: flex; gap: 14px; transform: rotate(-4deg); }\n    .motif-wendogo .mcard {\n      width: 58px; height: 86px; border-radius: 6px;\n      border: 1px solid var(--line-strong);\n    }\n    .motif-wendogo .mcard.day { background: linear-gradient(180deg, #1a1e2a, #0f1218); }\n    .motif-wendogo .mcard.night {\n      background: linear-gradient(180deg, #25283a, #14161f);\n      box-shadow: inset 0 0 20px rgba(90, 100, 160, 0.3);\n      transform: translateY(10px) rotate(6deg);\n    }\n    .motif-wendogo .mcard.hidden { background: linear-gradient(180deg, #151719, #0a0b0e); transform: rotate(-8deg) translateY(4px); }\n\n    /* Myceland motif: organic dot bloom */\n    .motif-myceland {\n      background:\n        radial-gradient(600px 400px at 50% 60%, rgba(210, 150, 90, 0.12), transparent 60%),\n        #0b0a09;\n    }\n    .motif-myceland .bloom {\n      position: absolute; inset: 0;\n      background
